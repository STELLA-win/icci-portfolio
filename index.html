<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Stella Dai - Personal Portfolio for ICCI 2026">
  <meta name="theme-color" content="#250b13">
  <title>Stella Dai - Portfolio 2026</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Sans+SC:wght@400;500&display=swap');

    /* ===========================================
       THEME AND PRESENTATION CHROME
       The authored slides remain untouched images.
       =========================================== */
    :root {
      --stage-bg: #17090e;
      --slide-bg: #f5eee8;
      --plum: #7d263f;
      --wine: #3b0d1b;
      --paper: #f5eee8;
      --ui-font: 'Noto Sans SC', sans-serif;
      --display-font: 'Cormorant Garamond', serif;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ===========================================
       FIXED 16:9 STAGE: MANDATORY BASE STYLES
       Slides are authored at 1920x1080 and scaled as a whole.
       =========================================== */
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--stage-bg, #000);
    }

    .deck-viewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 42%, rgba(125, 38, 63, 0.18), transparent 54%),
        var(--stage-bg, #000);
    }

    .deck-stage {
      position: absolute;
      left: 0;
      top: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      transform-origin: 0 0;
      background: var(--slide-bg, #fff);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.42);
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      display: block;
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      background: var(--slide-bg, #fff);
      transition: opacity 420ms ease;
    }

    .slide.active,
    .slide.visible {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
      z-index: 1;
    }

    img,
    video,
    canvas,
    svg {
      max-width: 100%;
      max-height: 100%;
    }

    .deck-controls {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 1000;
    }

    @media print {
      html,
      body {
        width: 1920px;
        height: auto;
        overflow: visible;
        background: #fff;
      }

      .deck-viewport {
        position: static;
        overflow: visible;
        background: #fff;
      }

      .deck-stage {
        position: static;
        width: auto;
        height: auto;
        transform: none !important;
        background: none;
        box-shadow: none;
      }

      .slide {
        position: relative;
        display: block !important;
        visibility: visible !important;
        opacity: 1 !important;
        pointer-events: auto !important;
        width: 1920px;
        height: 1080px;
        break-after: page;
        page-break-after: always;
      }

      .slide:last-child {
        break-after: auto;
        page-break-after: auto;
      }

      .deck-controls,
      .edge-nav,
      .help-panel,
      .progress-track {
        display: none !important;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.2s !important;
      }
    }

    /* ===========================================
       SOURCE-PAGE REPLICA
       Each image is a 1920x1080 render from the final PDF.
       =========================================== */
    .page-image {
      display: block;
      width: 1920px;
      height: 1080px;
      max-width: none;
      max-height: none;
      object-fit: fill;
      user-select: none;
      -webkit-user-drag: none;
      transform: scale(1.004);
      opacity: 0.96;
      transition:
        transform 760ms var(--ease),
        opacity 500ms ease;
      will-change: transform, opacity;
    }

    .slide.visible .page-image {
      transform: scale(1);
      opacity: 1;
    }

    .interactive-hotspot {
      position: absolute;
      z-index: 4;
      display: block;
      border: 2px solid transparent;
      border-radius: 4px;
    }

    .interactive-hotspot:focus-visible {
      border-color: rgba(116, 40, 60, 0.72);
      outline: 3px solid rgba(255, 255, 255, 0.9);
      outline-offset: 3px;
    }

    .video-link-label { left: 890px; top: 205px; width: 135px; height: 62px; }
    .video-link-frame { left: 545px; top: 292px; width: 480px; height: 330px; }
    .game-link-label { left: 80px; top: 340px; width: 196px; height: 58px; }
    .game-link-qr { left: 1735px; top: 925px; width: 126px; height: 120px; }

    /* ===========================================
       NAVIGATION UI
       Kept outside the slide so the original layout stays exact.
       =========================================== */
    .deck-controls {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 8px 12px;
      color: rgba(255, 255, 255, 0.84);
      background: rgba(24, 9, 14, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      box-shadow: 0 10px 34px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      font: 500 12px/1 var(--ui-font);
      letter-spacing: 0.08em;
      opacity: 0;
      transition: opacity 220ms ease;
    }

    body:hover .deck-controls,
    .deck-controls:focus-within {
      opacity: 1;
    }

    .control-button {
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 50%;
      color: inherit;
      background: transparent;
      cursor: pointer;
      font: 500 18px/1 var(--display-font);
      transition: background 180ms ease, color 180ms ease;
    }

    .control-button:hover,
    .control-button:focus-visible {
      color: #fff;
      background: rgba(255, 255, 255, 0.12);
      outline: none;
    }

    .counter {
      min-width: 58px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .progress-track {
      position: fixed;
      inset: auto 0 0;
      height: 3px;
      z-index: 1100;
      background: rgba(255, 255, 255, 0.08);
    }

    .progress-bar {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #b66b80, #f1d8df);
      transition: width 420ms var(--ease);
    }

    .edge-nav {
      position: fixed;
      top: 0;
      bottom: 0;
      z-index: 900;
      width: 12vw;
      max-width: 180px;
      border: 0;
      color: transparent;
      background: transparent;
      cursor: pointer;
    }

    .edge-nav.prev { left: 0; }
    .edge-nav.next { right: 0; }

    .edge-nav::after {
      position: absolute;
      top: 50%;
      color: rgba(255, 255, 255, 0.72);
      font: 500 34px/1 var(--display-font);
      opacity: 0;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .edge-nav.prev::after {
      content: '\2039';
      left: 26px;
      transform: translate(8px, -50%);
    }

    .edge-nav.next::after {
      content: '\203A';
      right: 26px;
      transform: translate(-8px, -50%);
    }

    .edge-nav:hover::after,
    .edge-nav:focus-visible::after {
      opacity: 1;
      transform: translate(0, -50%);
    }

    .edge-nav:focus-visible { outline: none; }

    /* ===========================================
       HELP PANEL
       =========================================== */
    .help-panel {
      position: fixed;
      right: 22px;
      top: 22px;
      z-index: 1200;
      width: 270px;
      padding: 18px 20px;
      color: rgba(255, 255, 255, 0.84);
      background: rgba(24, 9, 14, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      font: 400 13px/1.8 var(--ui-font);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
      transition: opacity 200ms ease, transform 240ms var(--ease), visibility 200ms;
    }

    .help-panel.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .help-panel strong {
      display: block;
      margin-bottom: 7px;
      color: #fff;
      font: 600 19px/1.2 var(--display-font);
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.76);
      background: var(--stage-bg);
      font: 500 13px/1 var(--ui-font);
      letter-spacing: 0.14em;
      transition: opacity 400ms ease, visibility 400ms;
    }

    .loading.done {
      opacity: 0;
      visibility: hidden;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading" aria-live="polite">LOADING PORTFOLIO</div>

  <div class="deck-viewport">
    <main class="deck-stage" id="deckStage" aria-label="Stella Dai 作品集">
      <section class="slide active" aria-label="封面">
        <img class="page-image" src="assets/slides/slide-01.png" alt="Stella's Portfolio 封面" draggable="false">
      </section>
      <section class="slide" aria-label="个人介绍">
        <img class="page-image" src="assets/slides/slide-02.png" alt="About Stella Dai" draggable="false">
      </section>
      <section class="slide" aria-label="创意项目 风颂牧影">
        <img class="page-image" src="assets/slides/slide-03.png" alt="Fengsong Muying 风颂牧影" draggable="false">
      </section>
      <section class="slide" aria-label="创作作品">
        <img class="page-image" src="assets/slides/slide-04.png" alt="关于创作" draggable="false">
        <a class="interactive-hotspot video-link-label" href="https://www.bilibili.com/video/BV12eapzgEvK/" target="_blank" rel="noopener" aria-label="在 B 站观看中轴映华夏视频"></a>
        <a class="interactive-hotspot video-link-frame" href="https://www.bilibili.com/video/BV12eapzgEvK/" target="_blank" rel="noopener" aria-label="播放中轴映华夏视频"></a>
      </section>
      <section class="slide" aria-label="新媒体实践">
        <img class="page-image" src="assets/slides/slide-05.png" alt="关于新媒体" draggable="false">
      </section>
      <section class="slide" aria-label="策展项目 在场">
        <img class="page-image" src="assets/slides/slide-06.png" alt="关于策展 在场" draggable="false">
      </section>
      <section class="slide" aria-label="摄影 静物与食物">
        <img class="page-image" src="assets/slides/slide-07.png" alt="关于摄影 Before the First Bite" draggable="false">
      </section>
      <section class="slide" aria-label="摄影 纪实与现场">
        <img class="page-image" src="assets/slides/slide-08.png" alt="关于摄影 Being Present" draggable="false">
      </section>
      <section class="slide" aria-label="摄影 人像">
        <img class="page-image" src="assets/slides/slide-09.png" alt="关于摄影 Before We Are Defined" draggable="false">
      </section>
      <section class="slide" aria-label="文创 校园产品">
        <img class="page-image" src="assets/slides/slide-10.png" alt="关于文创 Campus, Made Tangible" draggable="false">
      </section>

        <img class="page-image" src="assets/slides/slide-11.png" alt="关于文创 Stories to Keep" draggable="false">
      </section>
      <section class="slide" aria-label="人工智能交互设计">
        <img class="page-image" src="assets/slides/slide-12.png" alt="关于 AI AI-Native Interactive Design" draggable="false">
        <a class="interactive-hotspot game-link-label" href="https://service-453083130386.us-west2.run.app/" target="_blank" rel="noopener" aria-label="打开切霉豆腐 AI 互动游戏"></a>
        <a class="interactive-hotspot game-link-qr" href="https://service-453083130386.us-west2.run.app/" target="_blank" rel="noopener" aria-label="扫描或点击体验切霉豆腐 AI 互动游戏"></a>
      </section>
      <section class="slide" aria-label="结尾">
        <img class="page-image" src="assets/slides/slide-13.png" alt="Selected works are also selected ways of seeing" draggable="false">
      </section>
    </main>
  </div>

  <button class="edge-nav prev" id="edgePrev" aria-label="上一页"></button>
  <button class="edge-nav next" id="edgeNext" aria-label="下一页"></button>

  <nav class="deck-controls" aria-label="幻灯片控制">
    <button class="control-button" id="prevButton" aria-label="上一页">&#8249;</button>
    <span class="counter" id="counter">01 / 13</span>
    <button class="control-button" id="nextButton" aria-label="下一页">&#8250;</button>
    <button class="control-button" id="helpButton" aria-label="操作帮助">?</button>
  </nav>

  <div class="progress-track" aria-hidden="true">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <aside class="help-panel" id="helpPanel" aria-label="操作帮助">
    <strong>Portfolio Navigation</strong>
    <p>方向键 / 空格：翻页</p>
    <p>Home / End：首尾页</p>
    <p>鼠标滚轮或手机左右滑动：翻页</p>
    <p>按 H：显示或隐藏本说明</p>
  </aside>

  <script>
    /* ===========================================
       FIXED-STAGE PRESENTATION CONTROLLER
       =========================================== */
    class SlidePresentation {
      constructor() {
        this.stage = document.getElementById('deckStage');
        this.slides = [...document.querySelectorAll('.slide')];
        this.currentSlide = this.readHash();
        this.counter = document.getElementById('counter');
        this.progressBar = document.getElementById('progressBar');
        this.helpPanel = document.getElementById('helpPanel');
        this.wheelLocked = false;
        this.touchStartX = 0;
        this.touchStartY = 0;

        this.setupStageScale();
        this.setupControls();
        this.setupKeyboardNav();
        this.setupTouchNav();
        this.setupWheelNav();
        this.setupHashNav();
        this.showSlide(this.currentSlide, false);
        this.preloadImages();
      }

      readHash() {
        const match = window.location.hash.match(/slide=(\d+)/);
        const index = match ? Number(match[1]) - 1 : 0;
        return Math.max(0, Math.min(index, 12));
      }

      setupStageScale() {
        const scaleStage = () => {
          const factor = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
          const x = (window.innerWidth - 1920 * factor) / 2;
          const y = (window.innerHeight - 1080 * factor) / 2;
          this.stage.style.transform = `translate(${x}px, ${y}px) scale(${factor})`;
        };
        scaleStage();
        window.addEventListener('resize', scaleStage, { passive: true });
      }

      setupControls() {
        const prev = () => this.showSlide(this.currentSlide - 1);
        const next = () => this.showSlide(this.currentSlide + 1);
        document.getElementById('prevButton').addEventListener('click', prev);
        document.getElementById('nextButton').addEventListener('click', next);
        document.getElementById('edgePrev').addEventListener('click', prev);
        document.getElementById('edgeNext').addEventListener('click', next);
        document.getElementById('helpButton').addEventListener('click', () => this.toggleHelp());
      }

      setupKeyboardNav() {
        document.addEventListener('keydown', (event) => {
          if (['ArrowRight', 'ArrowDown', 'PageDown', ' '].includes(event.key)) {
            event.preventDefault();
            this.showSlide(this.currentSlide + 1);
          } else if (['ArrowLeft', 'ArrowUp', 'PageUp'].includes(event.key)) {
            event.preventDefault();
            this.showSlide(this.currentSlide - 1);
          } else if (event.key === 'Home') {
            event.preventDefault();
            this.showSlide(0);
          } else if (event.key === 'End') {
            event.preventDefault();
            this.showSlide(this.slides.length - 1);
          } else if (event.key.toLowerCase() === 'h') {
            this.toggleHelp();
          } else if (event.key === 'Escape') {
            this.helpPanel.classList.remove('show');
          }
        });
      }

      setupTouchNav() {
        document.addEventListener('touchstart', (event) => {
          const touch = event.changedTouches[0];
          this.touchStartX = touch.clientX;
          this.touchStartY = touch.clientY;
        }, { passive: true });

        document.addEventListener('touchend', (event) => {
          const touch = event.changedTouches[0];
          const dx = touch.clientX - this.touchStartX;
          const dy = touch.clientY - this.touchStartY;
          if (Math.abs(dx) > 54 && Math.abs(dx) > Math.abs(dy)) {
            this.showSlide(this.currentSlide + (dx < 0 ? 1 : -1));
          }
        }, { passive: true });
      }

      setupWheelNav() {
        document.addEventListener('wheel', (event) => {
          if (this.wheelLocked || Math.abs(event.deltaY) < 18) return;
          this.wheelLocked = true;
          this.showSlide(this.currentSlide + (event.deltaY > 0 ? 1 : -1));
          window.setTimeout(() => { this.wheelLocked = false; }, 620);
        }, { passive: true });
      }

      setupHashNav() {
        window.addEventListener('hashchange', () => {
          const target = this.readHash();
          if (target !== this.currentSlide) this.showSlide(target, false);
        });
      }

      showSlide(index, updateHash = true) {
        const nextIndex = Math.max(0, Math.min(index, this.slides.length - 1));
        this.currentSlide = nextIndex;
        this.slides.forEach((slide, slideIndex) => {
          const isCurrent = slideIndex === nextIndex;
          slide.classList.toggle('active', isCurrent);
          slide.classList.toggle('visible', isCurrent);
        });

        const current = String(nextIndex + 1).padStart(2, '0');
        const total = String(this.slides.length).padStart(2, '0');
        this.counter.textContent = `${current} / ${total}`;
        this.progressBar.style.width = `${((nextIndex + 1) / this.slides.length) * 100}%`;
        document.title = `Stella Dai - Portfolio 2026 (${nextIndex + 1}/${this.slides.length})`;

        if (updateHash) {
          history.replaceState(null, '', `#slide=${nextIndex + 1}`);
        }
      }

      toggleHelp() {
        this.helpPanel.classList.toggle('show');
      }

      preloadImages() {
        const images = [...document.querySelectorAll('.page-image')];
        Promise.all(images.map((image) => {
          if (image.complete) return Promise.resolve();
          return new Promise((resolve) => {
            image.addEventListener('load', resolve, { once: true });
            image.addEventListener('error', resolve, { once: true });
          });
        })).then(() => {
          document.getElementById('loading').classList.add('done');
        });

        window.setTimeout(() => {
          document.getElementById('loading').classList.add('done');
        }, 4500);
      }
    }

    new SlidePresentation();
  </script>
</body>
</html>
